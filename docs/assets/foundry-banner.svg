<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a09;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1c1917;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c0a09;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Foundry Logo / Icon -->
  <g transform="translate(490, 50)">
    <!-- Outer hexagon -->
    <polygon points="50,0 100,29 100,87 50,116 0,87 0,29" fill="none" stroke="#f97316" stroke-width="3" filter="url(#shadow)"/>
    <!-- Inner symbol: anvil/forge icon -->
    <text x="50" y="75" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900">F</text>
  </g>

  <!-- Title -->
  <text x="600" y="210" text-anchor="middle" fill="url(#title-grad)" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" letter-spacing="12" filter="url(#shadow)">
    FOUNDRY
  </text>

  <!-- Subtitle -->
  <text x="600" y="245" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" letter-spacing="6">
    ENGINEERING-GRADE MULTI-AGENT ORCHESTRATION
  </text>

  <!-- Divider Line -->
  <line x1="300" y1="265" x2="900" y2="265" stroke="url(#line-grad)" stroke-width="2"/>

  <!-- Core Principles - Four Pillars -->
  <g transform="translate(150, 280)">
    <!-- Pillar 1 -->
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
    <text x="90" y="30" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Flow First</text>
    <text x="90" y="50" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">一切行为附着在流程</text>
    <text x="90" y="65" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Agent 不拥有控制权</text>

    <!-- Pillar 2 -->
    <rect x="200" y="0" width="180" height="80" rx="8" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
    <text x="290" y="30" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Deterministic</text>
    <text x="290" y="50" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">稳定可预测优先于聪明</text>
    <text x="290" y="65" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">宁可保守也不失控</text>

    <!-- Pillar 3 -->
    <rect x="400" y="0" width="180" height="80" rx="8" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
    <text x="490" y="30" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Artifact Over Chat</text>
    <text x="490" y="50" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">核心资产是工程产物</text>
    <text x="490" y="65" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">无结构输出视为失败</text>

    <!-- Pillar 4 -->
    <rect x="600" y="0" width="180" height="80" rx="8" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
    <text x="690" y="30" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Agent Is Replaceable</text>
    <text x="690" y="50" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">任意 Agent 可被替换</text>
    <text x="690" y="65" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-size="11">不依赖模型的聪明程度</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="385" text-anchor="middle" fill="#57534e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" letter-spacing="2">
    "让复杂工程在 AI 参与下仍然可控"
  </text>
</svg>
